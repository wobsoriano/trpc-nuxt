name: Snapshot

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true
          run-install: true

      - name: Build
        run: vp run build:lib

      - name: Create a snapshot version
        id: snapshot
        run: vp dlx pkg-pr-new publish
